<svg width="600" height="600" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600">
  <defs>
    <linearGradient id="grad-1-6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0071e3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:0.8" />
    </linearGradient>
    <filter id="glow-1-6">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="600" fill="url(#grad-1-6)"/>

  <!-- Grid Pattern -->
  <g opacity="0.1" stroke="white" stroke-width="1">
    <line x1="0" y1="150" x2="600" y2="150"/>
    <line x1="0" y1="300" x2="600" y2="300"/>
    <line x1="0" y1="450" x2="600" y2="450"/>
    <line x1="150" y1="0" x2="150" y2="600"/>
    <line x1="300" y1="0" x2="300" y2="600"/>
    <line x1="450" y1="0" x2="450" y2="600"/>
  </g>

  <!-- Geometric Shapes -->
  <circle cx="150" cy="150" r="60" fill="#00d4ff" opacity="0.3" filter="url(#glow-1-6)"/>
  <circle cx="450" cy="450" r="80" fill="#00d4ff" opacity="0.2" filter="url(#glow-1-6)"/>

  <!-- Tech Lines -->
  <path d="M 100 300 Q 300 200 500 300" stroke="#00d4ff" stroke-width="3" fill="none" opacity="0.6" stroke-linecap="round"/>
  <path d="M 100 350 Q 300 400 500 350" stroke="#00d4ff" stroke-width="2" fill="none" opacity="0.4" stroke-linecap="round"/>

  <!-- Node Points -->
  <circle cx="100" cy="300" r="6" fill="#00d4ff"/>
  <circle cx="300" cy="200" r="5" fill="#00d4ff" opacity="0.7"/>
  <circle cx="500" cy="300" r="6" fill="#00d4ff"/>

  <!-- Corner Elements -->
  <rect x="20" y="20" width="40" height="40" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.5"/>
  <rect x="540" y="540" width="40" height="40" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.5"/>
</svg>